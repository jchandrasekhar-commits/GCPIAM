steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/webapp-a:$SHORT_SHA', '.']
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/webapp-a:$SHORT_SHA']
- name: 'gcr.io/cloud-builders/kubectl'
  args: ['apply', '-f', 'k8s/webapp-a-deployment.yaml']
  env:
  - 'CLOUDSDK_COMPUTE_REGION=$REGION'

images:
- 'gcr.io/$PROJECT_ID/webapp-a:$SHORT_SHA'

options:
  substitutionOption: ALLOW_LOOSE
