apiVersion: v1
kind: ServiceAccount
metadata:
  name: webapp-ksa
  namespace: default
  annotations:
    # Workload Identity: maps this KSA to the Google SA webapp-sa.
    # Replace PROJECT_ID with your actual project id.
    iam.gke.io/gcp-service-account: webapp-sa@PROJECT_ID.iam.gserviceaccount.com
