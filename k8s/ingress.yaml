apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: webapps-ingress
  annotations:
    kubernetes.io/ingress.class: "gce"
spec:
  defaultBackend:
    service:
      name: webapp-a
      port:
        number: 80
  rules:
  - http:
      paths:
      - path: /a
        pathType: Prefix
        backend:
          service:
            name: webapp-a
            port:
              number: 80
      - path: /b
        pathType: Prefix
        backend:
          service:
            name: webapp-b
            port:
              number: 80

# GKE Ingress backends are expected to map to NodePort services.
# If your services are currently LoadBalancer/ClusterIP, patch them before applying this ingress:
# kubectl patch svc webapp-a -n default -p '{"spec":{"type":"NodePort"}}'
# kubectl patch svc webapp-b -n default -p '{"spec":{"type":"NodePort"}}'
